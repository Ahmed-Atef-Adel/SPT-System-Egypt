<app-loader></app-loader>
<div class="horizontalMenucontainer">
    <app-switcher></app-switcher>
    <div class="page">
        <div class="">
            <!-- // header -->
            <app-header [hideClientSideBar]="hideClientSideBar" [hideReportsSideBar]="hideReportsSideBar"
                [hideSuspensionsSideBar]="hideSuspensionsSideBar" [hideLoansSideBar]="hideLoansSideBar"></app-header>
            <!-- //sidebar -->
            <app-sidebar
                *ngIf="(!hideClientSideBar && !hideReportsSideBar && !hideSuspensionsSideBar && !hideLoansSideBar)"
                appHoverEffectSidebar></app-sidebar>
        </div>
        <div class="main-content app-content"
            [ngStyle]="{'margin-left': (!hideClientSideBar && !hideReportsSideBar && !hideSuspensionsSideBar && !hideLoansSideBar) ? 'unset !important' : 'initial' ,'margin-right': (!hideClientSideBar && !hideReportsSideBar && !hideSuspensionsSideBar && !hideLoansSideBar) ? 'unset !important' : 'initial'}">
            <div class="main-container container-fluid" (click)="toggleSwitcherBody()">

                <!-- // contetnt  -->
                <router-outlet>
                    <app-loader></app-loader>
                </router-outlet>
            </div>
        </div>
        <!-- right sidebar -->
        <app-right-sidebar></app-right-sidebar>
        <!-- footer  -->
        <app-footer></app-footer>
    </div>
</div>
<app-tab-to-top></app-tab-to-top>
